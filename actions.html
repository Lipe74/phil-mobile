<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Phil-Mobile</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #0b1a7a 0%, #1535c5 60%, #0f62e0 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }
  .logo-wrap { width: 90px; height: 90px; border-radius: 50%; overflow: hidden; border: 3px solid rgba(255,196,0,0.7); }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-size: 26px; font-weight: 900; color: #FFC400; letter-spacing: 1px; }
  .sub { font-size: 12px; color: rgba(255,255,255,0.7); letter-spacing: 1px; text-transform: uppercase; }
  .person { font-size: 14px; color: #fff; margin-top: 4px; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    max-width: 320px;
    padding: 18px 24px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 800;
    text-decoration: none;
    letter-spacing: 0.5px;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-contact {
    background: #FFC400;
    color: #0b1a7a;
  }
  .btn-google {
    background: #fff;
    color: #0b1a7a;
  }
  .btn svg { width: 28px; height: 28px; flex-shrink: 0; }
  .btn-text { text-align: left; }
  .btn-text span { display: block; font-size: 11px; font-weight: 600; opacity: 0.7; }

  .divider { width: 100%; max-width: 320px; height: 1px; background: rgba(255,255,255,0.15); }
  .footer { font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; }
</style>
</head>
